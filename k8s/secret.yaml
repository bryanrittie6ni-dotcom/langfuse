apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: langfuse
type: Opaque
stringData:
  # ⚠️ 安全密钥 — 务必替换为自己的值
  # NextAuth 会话加密密钥 (openssl rand -hex 32)
  NEXTAUTH_SECRET: "f0f89a225ddbf7e8fdde9e2f001c2cec3bbf955cf739b784f6e2e9be1c3f9471"
  # API Key 哈希盐值 (openssl rand -hex 32)
  SALT: "015e2d1be3caae6018d5130e88180a824f7cb24450ba7fc8051f00a7948504a4"
  # 数据加密密钥，256 位 (openssl rand -hex 32) — 部署后不能再改
  ENCRYPTION_KEY: "9be8ff574c4dc2866f9203c6d8853b71bf52fa31e13a7a4d6e9ebdeb534ea0cf"

  # ⚠️ 数据库密码 — 改为你实际的密码
  DATABASE_URL: "postgresql://postgres:postgres5432@postgres:5432/postgres"

  # ⚠️ ClickHouse 密码
  CLICKHOUSE_PASSWORD: "clickhouse"

  # ⚠️ Redis 密码
  REDIS_AUTH: "myredissecret"

  # ⚠️ S3 存储密钥 — 改为你实际的 S3/MinIO 凭证
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: "minio"
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "miniosecret"
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: "minio"
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: "miniosecret"
  LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID: "minio"
  LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: "miniosecret"
