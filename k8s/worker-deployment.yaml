apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-worker
  namespace: langfuse
  labels:
    app: langfuse-worker
spec:
  replicas: 1                           # 🔧 生产环境建议 2+
  selector:
    matchLabels:
      app: langfuse-worker
  template:
    metadata:
      labels:
        app: langfuse-worker
    spec:
      # 🔧 如果使用私有镜像仓库，取消注释下面 3 行
      imagePullSecrets:
        - name: ccr-registry-secre
      containers:
        - name: langfuse-worker
          image: ccr.ccs.tencentyun.com/my-app-20/langfuse-worker:3
          ports:
            - containerPort: 3030
              name: http
          envFrom:
            - secretRef:
                name: langfuse3030        # 注入密钥
            - configMapRef:
                name: langfuse-config         # 注入普通配置
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3030"
          resources:                           # 🔧 按实际调整
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          startupProbe:
            httpGet:
              path: /api/health
              port: 3030
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3030
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3030
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-worker
  namespace: langfuse
  labels:
    app: langfuse-worker
spec:
  type: ClusterIP
  selector:
    app: langfuse-worker
  ports:
    - port: 3030
      targetPort: 3030
      name: http
