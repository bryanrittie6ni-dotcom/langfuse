apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: langfuse

resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - web-deployment.yaml
  - worker-deployment.yaml
  # - ingress.yaml            # 🔧 配好域名后取消注释

# 给 Secret 和 ConfigMap 加版本 hash 后缀，确保内容变更时 Pod 会自动重启
configurations:
  - nameReference.yaml
